fragment StudioData on Studio {
  id
  name
  url
  image_path
  details
  rating100
  scene_count
  image_count
  gallery_count
  performer_count
  favorite
}

query FindStudios($filter: FindFilterType, $studio_filter: StudioFilterType) {
  findStudios(filter: $filter, studio_filter: $studio_filter) {
    count
    studios {
      ...StudioData
    }
  }
}

query FindStudio($id: ID!) {
  findStudio(id: $id) {
    ...StudioData
  }
}

mutation UpdateStudioFavorite($id: ID!, $favorite: Boolean!) {
  studioUpdate(input: { id: $id, favorite: $favorite }) {
    id
    favorite
  }
}

mutation StudioUpdate($input: StudioUpdateInput!) {
  studioUpdate(input: $input) {
    id
  }
}

query ScrapeSingleStudio($source: ScraperSourceInput!, $input: ScrapeSingleStudioInput!) {
  scrapeSingleStudio(source: $source, input: $input) {
    name
    url
    image
    remote_site_id
    details
    stored_id
  }
}

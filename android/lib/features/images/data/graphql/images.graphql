fragment ImageData on Image {
  id
  title
  rating100
  date
  urls
  visual_files {
    ... on ImageFile {
      width
      height
      path
    }
    ... on VideoFile {
      width
      height
      path
    }
  }
  paths {
    thumbnail
    preview
    image
  }
}

query FindImages($filter: FindFilterType, $image_filter: ImageFilterType) {
  findImages(filter: $filter, image_filter: $image_filter) {
    count
    images {
      ...ImageData
    }
  }
}

query FindImage($id: ID!) {
  findImage(id: $id) {
    ...ImageData
  }
}

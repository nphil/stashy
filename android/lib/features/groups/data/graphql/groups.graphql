fragment GroupData on Group {
  id
  name
  date
  rating100
  director
  synopsis
  scene_count
  sub_group_count
}

query FindGroups($filter: FindFilterType, $group_filter: GroupFilterType) {
  findGroups(filter: $filter, group_filter: $group_filter) {
    count
    groups {
      ...GroupData
    }
  }
}

query FindGroup($id: ID!) {
  findGroup(id: $id) {
    ...GroupData
  }
}

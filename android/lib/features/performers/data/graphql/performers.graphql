fragment PerformerData on Performer {
  id
  name
  disambiguation
  url
  urls
  gender
  birthdate
  ethnicity
  country
  eye_color
  height_cm
  measurements
  fake_tits
  penis_length
  circumcised
  tattoos
  piercings
  alias_list
  favorite
  image_path
  details
  death_date
  hair_color
  weight
  rating100
  scene_count
  image_count
  gallery_count
  group_count
  tags {
    id
    name
  }
}

query FindPerformers($filter: FindFilterType, $performer_filter: PerformerFilterType) {
  findPerformers(filter: $filter, performer_filter: $performer_filter) {
    count
    performers {
      ...PerformerData
    }
  }
}

query FindPerformer($id: ID!) {
  findPerformer(id: $id) {
    ...PerformerData
  }
}

mutation UpdatePerformerFavorite($id: ID!, $favorite: Boolean!) {
  performerUpdate(input: { id: $id, favorite: $favorite }) {
    id
    favorite
  }
}

mutation PerformerUpdate($input: PerformerUpdateInput!) {
  performerUpdate(input: $input) {
    id
  }
}

mutation CreatePerformer($input: PerformerCreateInput!) {
  performerCreate(input: $input) {
    id
  }
}

query ScrapeSinglePerformer($source: ScraperSourceInput!, $input: ScrapeSinglePerformerInput!) {
  scrapeSinglePerformer(source: $source, input: $input) {
    name
    disambiguation
    gender
    birthdate
    ethnicity
    country
    eye_color
    height
    measurements
    fake_tits
    penis_length
    circumcised
    career_start
    career_end
    tattoos
    piercings
    aliases
    image
    details
    death_date
    hair_color
    weight
    remote_site_id
    urls
    images
    stored_id
  }
}

query ScrapePerformerURL($url: String!) {
  scrapePerformerURL(url: $url) {
    name
    disambiguation
    gender
    birthdate
    ethnicity
    country
    eye_color
    height
    measurements
    fake_tits
    penis_length
    circumcised
    career_start
    career_end
    tattoos
    piercings
    aliases
    image
    details
    death_date
    hair_color
    weight
    remote_site_id
    urls
    images
    stored_id
  }
}

name: Nightly Release Build

on:
  push:
    branches:
      - dev
  # schedule:
  #   - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: [ android, windows, linux, web, macos ]
        include:
          - target: android
            os: ubuntu-latest
            artifact_name: apk
          - target: windows
            os: windows-latest
            artifact_name: windows
          - target: linux
            os: ubuntu-latest
            artifact_name: linux
          - target: web
            os: ubuntu-latest
            artifact_name: web
          - target: macos
            os: macos-26
            artifact_name: macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build

      - name: Android build setup
        if: matrix.target == 'android'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Linux build setup
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            libsecret-1-dev \
            libmpv-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev

      - name: Generate macOS Flutter ephemeral files
        if: matrix.target == 'macos'
        run: flutter build macos --config-only

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "android" ]; then
            flutter build apk --release --split-per-abi
          elif [ "${{ matrix.target }}" = "windows" ]; then
            flutter build windows --release
          elif [ "${{ matrix.target }}" = "linux" ]; then
            flutter build linux --release
          elif [ "${{ matrix.target }}" = "web" ]; then
            flutter build web --release --base-href /StashFlow/
          elif [ "${{ matrix.target }}" = "macos" ]; then
            flutter build macos --release
          fi
        shell: bash

      - name: Package Windows
        if: matrix.target == 'windows'
        run: |
          cd build/windows/x64/runner/Release
          7z a ../../../../../StashFlow-windows-nightly.zip *
        shell: bash

      - name: Package Linux
        if: matrix.target == 'linux'
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../StashFlow-linux-nightly.zip .
        shell: bash

      - name: Package Web
        if: matrix.target == 'web'
        run: |
          cd build/web
          zip -r ../../StashFlow-web-nightly.zip .
        shell: bash

      - name: Deploy to GitHub Pages
        if: matrix.target == 'web'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Nightly to GitHub Pages: ${{ github.sha }}"

      - name: Package macOS
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../StashFlow-macos-nightly.zip *.app
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: StashFlow-nightly-${{ matrix.artifact_name }}
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk
            StashFlow-*-nightly.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get short SHA
        id: slug
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Checkout repository for tag update
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update/Push rolling `nightly` tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly ${{ github.sha }}
          git push --force origin refs/tags/nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Rolling Nightly Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.slug.outputs.sha_short }})
          body: "Latest development build from the dev branch. Commit: ${{ github.sha }}"
          prerelease: true
          make_latest: true
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Stashy

options:
  bundleIdPrefix: com.nphil
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"

settings:
  SWIFT_VERSION: 6.0

packages:
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    exactVersion: "2.3.4"

targets:
  Stashy:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Stashy
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: KSPlayer
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Stashy
        CFBundleName: Stashy
        CFBundleIdentifier: com.nphil.stashy
        CFBundleShortVersionString: "1.0.3"
        CFBundleVersion: "4"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nphil.stashy
        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "4"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          # Off: KSPlayer's bundled FFmpeg frameworks (e.g. libshaderc_combined) use
          # underscored CFBundleIdentifiers that product validation rejects. We ship an
          # unsigned IPA for sideloading, so validation is unnecessary.
          VALIDATE_PRODUCT: "NO"
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          DEBUG_INFORMATION_FORMAT: dwarf

name: Stashy

options:
  bundleIdPrefix: com.nphil
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"

settings:
  SWIFT_VERSION: 6.0

packages:
  stashy-videoengine:
    url: https://github.com/nphil/stashy-videoengine.git
    from: "1.0.0"

targets:
  Stashy:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Stashy
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: stashy-videoengine
        product: FFmpeg
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Stashy
        CFBundleName: Stashy
        CFBundleIdentifier: com.nphil.stashy
        CFBundleShortVersionString: "1.0.255"
        CFBundleVersion: "256"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: false
        # Opt out of iPhone's default 60fps cap on Core Animation / CADisplayLink so custom animations
        # and display-link rendering can hit the full 120Hz ProMotion rate (scrolling is already 120Hz).
        CADisableMinimumFrameDurationOnPhone: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSFaceIDUsageDescription: Unlock Stashy with Face ID.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nphil.stashy
        SWIFT_VERSION: 6.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: "1.0.255"
        CURRENT_PROJECT_VERSION: "256"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          # Off: bundled FFmpeg frameworks can carry CFBundleIdentifiers that product validation
          # rejects. We ship an unsigned IPA for sideloading, so validation is unnecessary.
          VALIDATE_PRODUCT: "NO"
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          DEBUG_INFORMATION_FORMAT: dwarf

# Stashy Companion — backend plugin for the Stashy iOS app.
# Plugin ID is this file's basename: "stashy-companion".
# Install: Stash → Settings → Plugins → Add Source, paste the index.yml URL
# from stash-plugin/README.md, then install "Stashy Companion".
name: Stashy Companion
description: >-
  Companion backend for the Stashy iOS app. Adds iPhone-native HEVC/AV1
  transcoding (GPU hevc_nvenc / CPU libx265 / CPU SVT-AV1) with VMAF perceptual
  quality targeting (encode to a target the eye can't tell from the source,
  phone model), ffprobe-based codec + HDR stats, and auto-tagging of
  direct-play-ready scenes — capabilities vanilla Stash lacks. Output is served
  back to the app over Stash's own HTTP with real Job progress.
version: 0.3.5
url: https://github.com/nphil/stashy/tree/main/stash-plugin
exec:
  - python
  - "{pluginDir}/stashy_companion.py"
interface: raw
errLog: warn

# Static file serving: files written to <pluginDir>/cache/ are exposed at
# /plugin/stashy-companion/assets/cache/<file> (Range-capable, path-jailed).
# The transcode task records the exact path on the source scene's custom_fields.
ui:
  assets:
    /cache: cache

settings:
  encoder:
    displayName: HEVC encoder
    description: "hevc_nvenc (NVIDIA GPU — e.g. Tesla P40) or libx265 (CPU). Auto-falls back to libx265 if nvenc is unavailable in ffmpeg."
    type: STRING
  allowAV1:
    displayName: Allow AV1 (SVT-AV1, CPU)
    description: "Permit AV1 output when the app requests it. CPU-only (Pascal GPUs cannot encode AV1); smaller files, much slower."
    type: BOOLEAN
  preserveHDR:
    displayName: Preserve HDR (10-bit)
    description: "Keep HDR10 / HLG sources as true 10-bit HDR (hevc_nvenc Main10 + BT.2020 color tags) so they display as HDR on an iPhone, instead of down-converting to 8-bit SDR. Dolby Vision is mapped to its HDR10/HLG base layer (NVENC can't emit DV); DV Profile 5 (no compatible base) falls back to SDR. Default on."
    type: BOOLEAN
  vmafTargeting:
    displayName: VMAF quality targeting
    description: "Default ON. Instead of guessing a CRF/CQ, encode a few short samples and binary-search the encoder's quality knob to hit a target VMAF (Netflix's perceptual metric — quality as the human eye sees it), measured with the PHONE-viewing model. So High/Balanced/Small become perceptual targets, and each file is the smallest that still looks good on a phone. Costs a few extra short sample encodes per transcode (adds ~1 min). Needs an ffmpeg build with libvmaf (run Self-Test to check); if it's missing it safely falls back to the old preset behaviour. Turn off to always use the fixed preset CRF. HDR sources always skip it (VMAF's model is SDR-trained)."
    type: BOOLEAN
  vmafHigh:
    displayName: VMAF target — High
    description: "Target VMAF for the app's 'High' quality when VMAF targeting is on (phone model, 0–100). Default 97. Higher = better looking + larger. Blank = default."
    type: NUMBER
  vmafBalanced:
    displayName: VMAF target — Balanced
    description: "Target VMAF for 'Balanced' (phone model, 0–100). Default 94. Blank = default."
    type: NUMBER
  vmafSmall:
    displayName: VMAF target — Small
    description: "Target VMAF for 'Small' (phone model, 0–100). Default 91 — smaller files, still good on a phone. Blank = default."
    type: NUMBER
  vmafSamples:
    displayName: VMAF analysis samples (speed)
    description: "How many short windows the VMAF search samples per candidate (1–4, default 3). The windows are measured in parallel, but VMAF is CPU-bound, so FEWER = FASTER analysis at some cost to how representative the score is across a varied scene. Try 2 for quicker downloads, 1 for fastest."
    type: NUMBER
  vmafMapResolutions:
    displayName: VMAF map resolutions
    description: "Which output resolutions the 'Compute VMAF Map' library task pre-analyses per scene (comma-separated, default '1080,720'). Each is one VMAF search per scene (~15–30s), so more resolutions = proportionally more one-time compute. The tiny result (a CRF number + curve) is cached so downloads at these resolutions skip the live analysis. Use '720' alone for the fastest first pass."
    type: STRING
  vmafMapBudgetMin:
    displayName: VMAF map time budget per run (min)
    description: "Optional cap (minutes) on how long each 'Compute VMAF Map' run works before stopping — it's resumable, so a nightly scheduled run can chip through the library in chunks. 0 = no limit (run to completion). Useful to keep the GPU free during the day."
    type: NUMBER
  thumbhashBudgetMin:
    displayName: ThumbHash map time budget per run (min)
    description: "Optional cap (minutes) on how long each 'Compute ThumbHash Map' run works before stopping — it's resumable, so it can chip through a big library in chunks. 0 = no limit (run to completion). ThumbHashing is fast (no GPU), so most libraries finish in one pass; this is only for very large collections."
    type: NUMBER
  cacheCapGB:
    displayName: Transcode cache cap (GB)
    description: "Trim the companion transcode cache to this size (least-recently-used first). 0 = unlimited."
    type: NUMBER
  ffmpegPath:
    displayName: ffmpeg directory override
    description: "Absolute path to the directory containing ffmpeg/ffprobe. Leave blank to use PATH / Stash's bundled ffmpeg. Point this at an NVENC-enabled ffmpeg build for GPU HEVC. (A pinned build installed via 'Install / Switch ffmpeg' takes priority over this.)"
    type: STRING
  av1Preset:
    displayName: AV1 speed preset (0–10)
    description: "SVT-AV1 preset: higher = much faster, slightly larger. 8 ≈ x265 medium (default), 6 = slower/smaller, 10 = fastest. AV1 is CPU-only, so this is the main speed knob."
    type: NUMBER
  ffmpegVersion:
    displayName: ffmpeg version (software / AV1)
    description: "Build used for CPU encoders (SVT-AV1, x265) + ffprobe — driver-irrelevant, so keep it modern for AV1 speed. 'latest' (default, BtbN rolling), a specific BtbN tag e.g. autobuild-2026-07-03-13-21 (pin), or 'system'. Change then run 'Install / Switch ffmpeg'."
    type: STRING
  ffmpegHwVersion:
    displayName: ffmpeg version (NVENC / hardware)
    description: "Build used ONLY for GPU hevc_nvenc — this must match your NVIDIA driver's NVENC API. 'jellyfin' (default — jellyfin-ffmpeg, works with driver ≥520, right for older/EOL cards like the Tesla P40), 'latest' (BtbN, needs driver ≥610), a BtbN tag, or 'system'. Leave equal to the software version to use one build for both."
    type: STRING
  ffmpegSha256:
    displayName: ffmpeg sha256 (advanced)
    description: "Optional: expected sha256 of the download tarball for the version above. If set, the install aborts on mismatch. Leave blank to skip (the binary is still run-verified regardless)."
    type: STRING
  ffmpegDownloadURL:
    displayName: ffmpeg download URL (advanced)
    description: "Override the exact tarball URL the install task fetches (ignores the version tag). Leave blank to use the pinned BtbN linux64 gpl build for the selected version."
    type: STRING
  autoReportNewScenes:
    displayName: Auto codec-report new scenes (on scan)
    description: "When a Stash scan creates a new scene, automatically ffprobe it and append it to the served playability report (no scene writes) — so the app's routing + filter stay current without re-running the Library Codec Report. Default on. Turn off if you'd rather run the report manually."
    type: BOOLEAN

# Event hooks — fire the plugin automatically. These write ONLY the served playability.json (filesystem),
# never a scene, so they queue no Scene.Update/Sync tasks. Gated by the autoReportNewScenes setting.
hooks:
  - name: Codec-report new scenes
    description: "On a new scene (e.g. from a library Scan), ffprobe it and append to the served playability report."
    triggeredBy:
      - Scene.Create.Post
  - name: Drop deleted scenes from the report
    description: "When a scene is deleted, remove it from the served playability report."
    triggeredBy:
      - Scene.Destroy.Post

tasks:
  - name: Self-Test
    description: "Health check: report the ACTIVE ffmpeg version + encoders, GraphQL reachability, installed builds, and cache/serving — a PASS/FAIL summary. Run after a Stash upgrade to confirm nothing broke."
    defaultArgs:
      mode: selftest
  - name: Install / Switch ffmpeg
    description: "Install (or instantly switch to, if already downloaded) the pinned ffmpeg build named in the 'ffmpeg version' setting — a modern static build with SVT-AV1 3.x + nvenc. Multiple versions coexist; set 'system' to fall back to Stash's ffmpeg."
    defaultArgs:
      mode: update_ffmpeg
  - name: Transcode for iPhone
    description: "Transcode one scene to an iPhone-native MP4 and serve it back to the app. Args (from runPluginTask): scene_id, codec (hevc|av1), resolution (1080|720|480|240), quality (high|medium|low). With VMAF targeting on (default), the quality preset picks a target VMAF and the encoder's CRF/CQ is chosen to hit it (perceptual, phone-model) rather than a fixed number. Usually invoked by the Stashy app."
    defaultArgs:
      mode: transcode
  - name: Library Codec Report
    description: "ffprobe scenes → the served playability report (codec / pixel-format / HDR / tier: direct · on-device remux · needs-transcode) the app reads for smarter routing + the playability filter. INCREMENTAL: only NEW files are analyzed (already-reported scenes are skipped, deleted ones pruned), so re-running after a scan is fast. Makes ZERO scene writes — no Scene.Update hooks, no 'Sync' tasks. Usually unnecessary to run by hand — the auto-report hook keeps it current on scan (see the 'Auto codec-report new scenes' setting)."
    defaultArgs:
      mode: stats
  - name: Rebuild Codec Report (full)
    description: "Re-ffprobe EVERY scene from scratch and rewrite the served playability report — use only if a file changed in place (same scene, new codec) and the incremental report missed it. Still zero scene writes."
    defaultArgs:
      mode: stats
      rebuild: true
  - name: Compute VMAF Map
    description: "Pre-analyse the library so downloads/streams get per-video VMAF-optimal quality WITHOUT the ~30s live analysis each time. Runs the VMAF search per scene for each resolution in the 'VMAF map resolutions' setting and caches just the tiny result (a CRF number + curve) in served vmaf-map.json — kilobytes total, never the video files. INCREMENTAL (skips scenes already mapped + HDR sources) and resumable; set a 'VMAF map time budget' to chip through the library on a schedule. Zero scene writes. First full pass is GPU-heavy (~15s–30s per scene per resolution) — run it overnight."
    defaultArgs:
      mode: vmafmap
  - name: Rebuild VMAF Map (full)
    description: "Recompute the VMAF CRF map for EVERY scene from scratch (e.g. after changing the target VMAF or replacing files). Same as Compute VMAF Map but ignores the incremental cache. GPU-heavy — run overnight."
    defaultArgs:
      mode: vmafmap
      rebuild: true
  - name: Compute ThumbHash Map
    description: "Pre-compute a tiny ThumbHash (a ~25-byte blurry-placeholder) for every scene's cover into served thumbhashes.json, so the Stashy app can show an INSTANT blurry preview of scenes you've never opened (no blank cards on a fast flick) before the real thumbnail loads. Kilobytes for the whole library; INCREMENTAL (skips scenes already hashed) and resumable; set a 'ThumbHash map time budget' to chip through a huge library. No GPU — fast (a light ffmpeg decode per cover). Zero scene writes."
    defaultArgs:
      mode: thumbhash
  - name: Rebuild ThumbHash Map (full)
    description: "Recompute the ThumbHash placeholder for EVERY scene from scratch (e.g. after regenerating covers). Same as Compute ThumbHash Map but ignores the incremental cache. Still fast; zero scene writes."
    defaultArgs:
      mode: thumbhash
      rebuild: true
  - name: Remove Stashy Tags (cleanup)
    description: "One-time cleanup for installs that ran plugin v0.1.16/0.1.17 (which tagged scenes): DELETE the Stashy:* tag definitions. Stash cascade-removes them from every scene with NO per-scene sceneUpdate, so this fires no Scene.Update hooks and queues NO Sync tasks. Your own tags are untouched. (A residual stashy_probe custom field, if present, is left as harmless dead data — clearing it would be a per-scene write = a Sync-task storm.)"
    defaultArgs:
      mode: untag
  - name: Purge Transcode Cache
    description: "Delete the companion HEVC/AV1 cache (or trim it to the size cap if one is set)."
    defaultArgs:
      mode: purge
  - name: Delete Cache File
    description: "Delete the cached iPhone transcode(s) for ONE scene — called automatically by the Stashy app once it has finished downloading a server-transcoded file, so proxies don't accumulate on the server. Args (from runPluginTask): scene_id."
    defaultArgs:
      mode: delete

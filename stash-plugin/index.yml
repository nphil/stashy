#   Settings → Plugins → Available Plugins → Add Source
#   Name: Stashy   URL: https://raw.githubusercontent.com/nphil/stashy/main/stash-plugin/index.yml
# `path` is resolved relative to this index's URL, so stashy-companion.zip must
# sit next to this file. `sha256` must match the zip byte-for-byte or Stash
# aborts the install (rebuild the zip and update this hash together).

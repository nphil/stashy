name: Build IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - 'android/**'
      - 'stash-plugin/**'
      - '.github/workflows/android.yml'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-15

    env:
      SCHEME:       Stashy
      PROJECT:      Stashy.xcodeproj
      ARCHIVE_PATH: build/Stashy.xcarchive

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          cd ios
          CURRENT=$(python3 -c "import plistlib; print(plistlib.load(open('Info.plist','rb'))['CFBundleShortVersionString'])")
          BUILD=$(python3 -c "import plistlib; print(plistlib.load(open('Info.plist','rb'))['CFBundleVersion'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          NEW_BUILD="$((BUILD + 1))"
          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "build=$NEW_BUILD"  >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VER"     >> "$GITHUB_OUTPUT"

      - name: Update version in source files
        run: |
          cd ios
          python3 - <<PYEOF
          import plistlib, re
          ver   = "${{ steps.ver.outputs.version }}"
          build = "${{ steps.ver.outputs.build }}"

          with open('Info.plist', 'rb') as f:
              p = plistlib.load(f)
          p['CFBundleShortVersionString'] = ver
          p['CFBundleVersion'] = build
          with open('Info.plist', 'wb') as f:
              plistlib.dump(p, f, fmt=plistlib.FMT_XML)

          with open('project.yml') as f:
              text = f.read()
          text = re.sub(r'CFBundleShortVersionString:\s*"[^"]*"',
                        f'CFBundleShortVersionString: "{ver}"', text)
          text = re.sub(r'CFBundleVersion:\s*"[^"]*"',
                        f'CFBundleVersion: "{build}"', text)
          text = re.sub(r'MARKETING_VERSION:\s*"[^"]*"',
                        f'MARKETING_VERSION: "{ver}"', text)
          text = re.sub(r'CURRENT_PROJECT_VERSION:\s*"[^"]*"',
                        f'CURRENT_PROJECT_VERSION: "{build}"', text)
          with open('project.yml', 'w') as f:
              f.write(text)
          print(f"Bumped to {ver} (build {build})")
          PYEOF

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Resolve Swift packages
        run: |
          cd ios
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -derivedDataPath build/DD

      - name: Build (unsigned)
        run: |
          cd ios
          set -o pipefail
          # xcodebuild's final "Validate" step can reject embedded dynamic frameworks for underscored
          # CFBundleIdentifiers. Our FFmpeg links statically (no embedded frameworks), so this normally
          # no longer fires — but we keep tolerating a non-zero exit here as a safety net; the .app is
          # already complete by then, and the executable + IPA-size gates in Package catch real failures.
          xcodebuild build \
            -project      "$PROJECT" \
            -scheme       "$SCHEME" \
            -configuration Release \
            -destination  "generic/platform=iOS" \
            -derivedDataPath build/DD \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

      - name: Package into IPA
        run: |
          cd ios
          APP_PATH=$(find build/DD/Build/Products/Release-iphoneos \
            -maxdepth 1 -name "*.app" \
            2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not built (real build failure):"
            find build/DD/Build/Products -maxdepth 3 2>/dev/null || echo "(build products missing)"
            exit 1
          fi
          echo "✅ Found: $APP_PATH"

          # The build step swallows xcodebuild's exit code (it always "fails" on the framework
          # validation), so a *real* compile/link failure can leave behind a skeleton .app with no
          # executable and no frameworks. Verify completeness here, or we'd publish a tiny broken IPA.
          EXE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo Stashy)
          if [ ! -s "$APP_PATH/$EXE" ]; then
            echo "❌ App executable '$EXE' missing/empty — the build failed (compile/link error)."
            exit 1
          fi
          # Frameworks count is informational only: FFmpeg may link statically (no embedded dynamic
          # frameworks), so an empty Frameworks dir is valid. The IPA-size backstop below is the real
          # completeness gate for the broken-shell case.
          FW_COUNT=$(ls -d "$APP_PATH"/Frameworks/*.framework 2>/dev/null | wc -l | tr -d ' ')
          echo "✅ Executable present (embedded frameworks: ${FW_COUNT:-0})."

          # Fix underscored CFBundleIdentifiers in the embedded frameworks (the validation the
          # build tripped on). Done on the finished .app so no package re-extraction reverts it.
          find "$APP_PATH/Frameworks" -name "Info.plist" 2>/dev/null | while read -r plist; do
            id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$plist" 2>/dev/null) || continue
            case "$id" in
              *_*)
                /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${id//_/}" "$plist" \
                  && echo "Patched $(basename "$(dirname "$plist")"): $id -> ${id//_/}"
                ;;
            esac
          done

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qr Stashy.ipa Payload/
          IPA_BYTES=$(wc -c < Stashy.ipa | tr -d ' ')
          echo "IPA size: $IPA_BYTES bytes ($(du -sh Stashy.ipa | cut -f1))"
          # Backstop for the broken-shell case (those were ~60KB with no binary). FFmpeg links
          # statically and dead-strips to what's actually called, so the IPA grows with usage
          # (~2MB today, more as the transcode pipeline lands). The executable-present check above is
          # the primary gate; this floor just catches gross truncation.
          if [ "$IPA_BYTES" -lt 1000000 ]; then
            echo "❌ IPA is only $IPA_BYTES bytes — looks like a broken shell; refusing to publish."
            exit 1
          fi

      - name: Commit version bump, update apps.json, tag, and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          PUBLISHED_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_SIZE=$(wc -c < ios/Stashy.ipa | tr -d ' ')
          DOWNLOAD_URL="https://github.com/nphil/stashy/releases/download/$TAG/Stashy.ipa"
          RELEASE_NOTES="Unsigned IPA — sideload with Feather/AltStore. Built from \`$SHORT_SHA\` on $(date -u +'%Y-%m-%d %H:%M UTC')"

          VERSION="$VERSION" PUBLISHED_DATE="$PUBLISHED_DATE" DOWNLOAD_URL="$DOWNLOAD_URL" \
          IPA_SIZE="$IPA_SIZE" RELEASE_NOTES="$RELEASE_NOTES" \
          python3 - <<'PYEOF'
          import json, os

          version = os.environ['VERSION']
          date    = os.environ['PUBLISHED_DATE']
          url     = os.environ['DOWNLOAD_URL']
          size    = int(os.environ['IPA_SIZE'])
          body    = os.environ['RELEASE_NOTES']

          with open('apps.json') as f:
              data = json.load(f)

          app = data['apps'][0]
          new_ver = {
              "version": version,
              "buildVersion": version,
              "date": date,
              "localizedDescription": body,
              "downloadURL": url,
              "size": size
          }

          app['versions'] = [v for v in app['versions']
                             if v['version'] != version]
          app['versions'].insert(0, new_ver)

          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')

          print(f"apps.json patched for {version} (size {size})")
          PYEOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/Info.plist ios/project.yml apps.json
          git commit -m "chore: bump version to $VERSION [skip ci]"

          git fetch origin main
          git rebase origin/main
          git push origin main

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            ios/Stashy.ipa \
            --title "$TAG" \
            --notes "$RELEASE_NOTES"
